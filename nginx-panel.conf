# /etc/nginx/sites-available/fb-autoposter-panel
# Reuses the existing nginx. Panel runs on 127.0.0.1:8020 (8000/8001 are taken).
# After copying: ln -s to sites-enabled, nginx -t, then certbot --nginx -d <domain>.
server {
    listen 80;
    server_name panel.gvprime.ai;   # <-- change to your real subdomain

    location / {
        proxy_pass http://127.0.0.1:8020;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
